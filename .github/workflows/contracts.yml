name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/tribunal-reputation
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/tribunal-reputation/target
          key: cargo-${{ hashFiles('contracts/tribunal-reputation/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --release

      - name: cargo wasm
        run: cargo build --release --target wasm32-unknown-unknown

      - name: cosmwasm-check
        # Pin to the 2.x line because (a) it matches our cosmwasm-std 2.x
        # major and (b) the latest 3.x release fails to link on current
        # stable Rust due to a wasmer-vm/__rust_probestack issue.
        run: |
          cargo install cosmwasm-check --version "^2" --locked
          cosmwasm-check target/wasm32-unknown-unknown/release/tribunal_reputation.wasm
