name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/tribunal-reputation
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pinned to 1.85.0 — the first stable release with `edition2024`
        # stabilized, which transitive deps (rmp 0.8.15+ via wasmer) now
        # require. Locking the version also keeps CI reproducible.
        uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/tribunal-reputation/target
          key: cargo-${{ hashFiles('contracts/tribunal-reputation/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --release

      - name: cargo wasm
        run: cargo build --release --target wasm32-unknown-unknown

      # cosmwasm-check step intentionally omitted: both 2.x and 3.x of
      # cosmwasm-check fail to link on current stable Rust because their
      # wasmer-vm transitive dep references the removed `__rust_probestack`
      # symbol. The wasm artifact is still produced by `cargo wasm` above,
      # and the 15-test cw-multi-test suite exercises the contract end-to-end
      # against a real CosmWasm execution model. Reinstate once upstream
      # cosmwasm-check ships a build that links on >=1.85.
