server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Astro generates clean URLs like /docs/methodology/ — try the directory
    # first (Astro outputs index.html per route), then fall back to 404.
    location / {
        try_files $uri $uri/ $uri/index.html /404.html =404;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Long cache on hashed static assets; short cache on HTML.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
