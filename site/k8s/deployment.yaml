apiVersion: apps/v1
kind: Deployment
metadata:
  name: tribunal-site
  namespace: zaphod
  labels:
    app: tribunal-site
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tribunal-site
  template:
    metadata:
      labels:
        app: tribunal-site
    spec:
      nodeSelector:
        kubernetes.io/hostname: zaphod
      containers:
        - name: web
          image: docker.io/library/tribunal-site:latest
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 80
              hostPort: 3400
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
